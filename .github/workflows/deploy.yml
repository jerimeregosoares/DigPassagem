name: Deploy to HostGator

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Tenta baixar submodulos, mas o nosso foi removido

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão LTS mais recente compatível com Tailwind v4/Vite

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # Pasta onde o Vite coloca o build
          server-dir: ./ # Ajuste para a pasta correta no servidor (ex: /public_html/)
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
