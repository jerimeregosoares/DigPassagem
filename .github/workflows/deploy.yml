name: Deploy to HostGator

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false # Garante que não tente buscar submódulos inexistentes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean Install Dependencies (Linux)
        run: |
          # Remove qualquer vestígio de instalação anterior ou lockfile do Windows
          rm -rf node_modules package-lock.json
          
          # Limpa o cache do npm para evitar binários corrompidos/errados
          npm cache clean --force
          
          # Instala as dependências do zero para o ambiente Linux atual
          npm install --legacy-peer-deps

      - name: Rebuild Native Bindings
        # Força a recompilação de módulos nativos (como Tailwind Oxide) para Linux
        run: npm rebuild

      - name: Build project
        run: npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
