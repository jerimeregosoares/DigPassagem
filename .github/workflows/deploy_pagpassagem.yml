name: Deploy Automático via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: 🧹 Limpeza Profunda (Cache Busting)
        run: |
          rm -rf node_modules package-lock.json pnpm-lock.yaml dist
          pnpm store prune

      - name: 📦 Instalar dependências (PNPM)
        run: |
          pnpm install --no-frozen-lockfile
          pnpm remove @tailwindcss/vite @tailwindcss/oxide || true
          pnpm add -D tailwindcss@3.4.1 postcss@8.4.35 autoprefixer@10.4.17

      - name: 🔍 Debug - Listar versões instaladas
        run: |
          echo "Verificando versões instaladas..."
          pnpm list tailwindcss postcss vite
          echo "Verificando se @tailwindcss/oxide ainda existe..."
          ls -R node_modules/@tailwindcss || echo "Diretório @tailwindcss limpo/ok"

      - name: 🏗️ Build do projeto
        run: pnpm run build
        env:
          NODE_ENV: production
          CI: true

      - name: ✅ Verificar build
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Diretório dist não foi gerado!"
            exit 1
          fi
          echo "✅ Build gerado com sucesso!"
          ls -la dist/

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: dist/
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
            **/README.md
            **/*.log
          timeout: 600000
          log-level: verbose

      - name: 🎉 Deploy concluído
        run: |
          echo "🚀 Deploy realizado com sucesso!"
